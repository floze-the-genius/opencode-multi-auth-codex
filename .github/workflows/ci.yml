name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun ci

      - name: Typecheck
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Audit production and development dependencies
        run: bun audit
